---
# ODPlatform 运行配置模板 — val
# D7 模型评估配置，字段对应 YOLOValConfig

# ----- 核心参数 -----
task: detect
experiment_id: ''
data: ''
model: yolo11n.pt

# ----- 验证控制 -----
split: val
conf: 0.001
iou: 0.6
max_det: 300

# ----- 输入配置 -----
imgsz: 640
batch: 16
workers: 8

# ----- 设备配置 -----
device: '0'
amp: true

# ----- 评估设置 -----
half: true
plots: true
save_json: true
save_hybrid: false

# ----- 输出配置 -----
project: runs/detect
name: val
exist_ok: false
verbose: true

# ----- 任务特定 -----
mask_ratio: 4
overlap_mask: true
dnn: false
