---
# ODPlatform 运行配置 — train
# 工作区标准路径: configs/runtime/train.yaml
#
# 使用方式:
#   build_train_config(yaml_path='configs/runtime/train.yaml')
#   数据集: odp-validate --dataset rsod --task detect

# ============================================================================
# 元信息（平台）
# ============================================================================

task: detect
experiment_id: rsod_baseline_v1

# ============================================================================
# 数据集
# ============================================================================

data: data/processed/rsod.yaml

# ============================================================================
# 模型权重
# ============================================================================

model: yolo11n.pt

# ============================================================================
# 训练超参
# ============================================================================

epochs: 100
imgsz: 640
batch: 16
device: "0"
workers: 8
lr0: 0.01
project: runs/detect
name: rsod_train
save: true
save_period: -1
patience: 100
seed: 42
verbose: true

# ============================================================================
# 数据增强
# ============================================================================

mosaic: 1.0
close_mosaic: 10
